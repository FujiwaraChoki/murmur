name: Release DMG

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-dmg:
    runs-on: macos-14
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify selected Xcode
        run: xcodebuild -version

      - name: Compute release metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          tag="main-${GITHUB_RUN_NUMBER}-${short_sha}"
          title="Murmur main build ${GITHUB_RUN_NUMBER} (${short_sha})"
          notes_file="$RUNNER_TEMP/release-notes.md"

          cat <<EOF > "$notes_file"
          Automated DMG build for commit \`${GITHUB_SHA}\` on \`main\`.

          - Commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          - Workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          {
            echo "short_sha=$short_sha"
            echo "tag=$tag"
            echo "title=$title"
            echo "notes_file=$notes_file"
          } >> "$GITHUB_OUTPUT"

      - name: Build DMG
        id: build
        env:
          MURMUR_RELEASE_SUFFIX: main-${{ steps.meta.outputs.short_sha }}
        run: ./scripts/build-macos-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.dmg_name }}
          path: ${{ steps.build.outputs.dmg_path }}

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.title }}
          RELEASE_NOTES_FILE: ${{ steps.meta.outputs.notes_file }}
          RELEASE_ASSET_PATH: ${{ steps.build.outputs.dmg_path }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES_FILE" \
              --prerelease
            gh release upload "$RELEASE_TAG" "$RELEASE_ASSET_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$RELEASE_ASSET_PATH" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES_FILE" \
              --prerelease
          fi
